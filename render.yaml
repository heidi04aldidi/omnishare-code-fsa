services:
  - type: web
    name: omnishare-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/prod.db
      - key: JWT_SECRET
        generateValue: true
